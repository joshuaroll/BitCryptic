<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cryptic Croc — Encouraging / Not Quite</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a1628;
      font-family: 'Nunito', sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 24px;
    }
    h1 { font-family: 'Fredoka One', cursive; color: #ffd700; font-size: 1.4rem; text-shadow: 0 0 20px rgba(255,215,0,0.3); }
    .subtitle { color: rgba(255,255,255,0.5); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; }
    .card {
      background: linear-gradient(135deg, #1a2444 0%, #0f1a30 100%);
      border: 2px solid rgba(255, 215, 0, 0.3);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(255,215,0,0.05);
      text-align: center;
    }
    .speech {
      margin-top: 20px;
      background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,215,0,0.03));
      border: 1px solid rgba(255,215,0,0.25);
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.85);
      line-height: 1.6;
      position: relative;
    }
    .speech::after {
      content: '';
      position: absolute; top: -8px; left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 14px; height: 14px;
      background: rgba(255,215,0,0.08);
      border-left: 1px solid rgba(255,215,0,0.25);
      border-top: 1px solid rgba(255,215,0,0.25);
    }
    .speaker { font-family: 'Fredoka One', cursive; font-size: 0.8rem; color: #ffd700; margin-bottom: 6px; }
    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }
    @keyframes headTilt {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(6deg); }
    }
    @keyframes patPat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-4px) rotate(-3deg); }
      75% { transform: translateY(-4px) rotate(3deg); }
    }
    @keyframes heartBeat {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.15); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="subtitle">Character Sheet — Pose 4 of 5</div>
  <h1>Cryptic Croc: Keep Trying!</h1>

  <div class="card">
    <svg width="280" height="340" viewBox="0 0 280 340" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bodyGrad" cx="50%" cy="40%" r="55%">
          <stop offset="0%" stop-color="#5ab87a"/>
          <stop offset="100%" stop-color="#2d7a4a"/>
        </radialGradient>
        <radialGradient id="bellyGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#c8e6a0"/>
          <stop offset="100%" stop-color="#a0d070"/>
        </radialGradient>
        <filter id="softShadow">
          <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
        </filter>
      </defs>

      <!-- Floating hearts -->
      <g style="animation: heartBeat 2s ease-in-out infinite;">
        <path d="M60,75 Q60,65 68,65 Q76,65 76,75 Q76,85 68,92 Q60,85 60,75 Z" fill="#ff6b8a" opacity="0.5"/>
      </g>
      <g style="animation: heartBeat 2s ease-in-out infinite 0.7s;">
        <path d="M200,60 Q200,52 206,52 Q212,52 212,60 Q212,68 206,73 Q200,68 200,60 Z" fill="#ff6b8a" opacity="0.4" transform="scale(0.7) translate(85,20)"/>
      </g>
      <g style="animation: heartBeat 2s ease-in-out infinite 1.4s;">
        <path d="M45,100 Q45,94 49,94 Q53,94 53,100 Q53,106 49,109 Q45,106 45,100 Z" fill="#ff6b8a" opacity="0.35"/>
      </g>

      <!-- Shadow -->
      <ellipse cx="140" cy="320" rx="60" ry="10" fill="rgba(0,0,0,0.25)"/>

      <!-- Tail - gentle sway -->
      <path d="M78,275 Q42,262 28,238 Q18,218 32,210" fill="none" stroke="url(#bodyGrad)" stroke-width="16" stroke-linecap="round"/>
      <path d="M55,258 L51,250" stroke="#3a9a5a" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M38,242 L35,234" stroke="#3a9a5a" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

      <!-- Left leg -->
      <ellipse cx="112" cy="305" rx="16" ry="9" fill="url(#bodyGrad)"/>
      <circle cx="100" cy="303" r="3.5" fill="#4aaa6a"/>
      <circle cx="108" cy="300" r="3.5" fill="#4aaa6a"/>
      <circle cx="116" cy="299" r="3.5" fill="#4aaa6a"/>

      <!-- Right leg -->
      <ellipse cx="168" cy="305" rx="16" ry="9" fill="url(#bodyGrad)"/>
      <circle cx="160" cy="303" r="3.5" fill="#4aaa6a"/>
      <circle cx="168" cy="300" r="3.5" fill="#4aaa6a"/>
      <circle cx="176" cy="299" r="3.5" fill="#4aaa6a"/>

      <!-- Body -->
      <ellipse cx="140" cy="238" rx="55" ry="68" fill="url(#bodyGrad)" filter="url(#softShadow)"/>
      <ellipse cx="140" cy="248" rx="35" ry="44" fill="url(#bellyGrad)" opacity="0.5"/>

      <!-- Left arm - reaching out supportively -->
      <g style="animation: patPat 2.5s ease-in-out infinite;">
        <path d="M88,215 Q60,200 48,185 Q40,175 42,165" fill="none" stroke="url(#bodyGrad)" stroke-width="14" stroke-linecap="round"/>
        <circle cx="42" cy="163" r="8" fill="#4aaa6a"/>
        <!-- Open supportive hand -->
        <circle cx="34" cy="158" r="4" fill="#5abb7a"/>
        <circle cx="42" cy="155" r="4" fill="#5abb7a"/>
        <circle cx="50" cy="158" r="4" fill="#5abb7a"/>
        <circle cx="36" cy="165" r="3.5" fill="#5abb7a"/>
      </g>

      <!-- Right arm - thumbs up -->
      <g>
        <path d="M192,218 Q215,200 225,180 Q230,168 225,160" fill="none" stroke="url(#bodyGrad)" stroke-width="14" stroke-linecap="round"/>
        <circle cx="224" cy="158" r="8" fill="#4aaa6a"/>
        <!-- Thumb up -->
        <ellipse cx="224" cy="142" rx="5" ry="9" fill="#5abb7a"/>
        <!-- Fist -->
        <circle cx="218" cy="155" r="4" fill="#5abb7a"/>
        <circle cx="224" cy="152" r="3.5" fill="#5abb7a"/>
        <circle cx="230" cy="155" r="4" fill="#5abb7a"/>
      </g>

      <!-- Spine -->
      <path d="M140,170 L137,180 L143,180 Z" fill="#3a9a5a" opacity="0.6"/>
      <path d="M140,182 L137,193 L143,193 Z" fill="#3a9a5a" opacity="0.55"/>

      <!-- Head - tilted slightly with empathy -->
      <g style="transform-origin: 140px 135px; animation: headTilt 4s ease-in-out infinite;">
        <ellipse cx="140" cy="135" rx="50" ry="42" fill="url(#bodyGrad)" filter="url(#softShadow)"/>

        <!-- Snout -->
        <ellipse cx="140" cy="162" rx="34" ry="16" fill="#4aaa6a"/>
        <ellipse cx="140" cy="159" rx="28" ry="12" fill="#5abb7a" opacity="0.5"/>

        <!-- Nostrils -->
        <ellipse cx="130" cy="164" rx="2.5" ry="2" fill="#2d6a3a"/>
        <ellipse cx="150" cy="164" rx="2.5" ry="2" fill="#2d6a3a"/>

        <!-- Warm encouraging smile -->
        <path d="M118,170 Q130,180 140,180 Q150,180 162,170" fill="none" stroke="#2d6a3a" stroke-width="2.5" stroke-linecap="round"/>

        <!-- Eyes - warm and kind, slight upward arc -->
        <g>
          <ellipse cx="120" cy="125" rx="15" ry="16" fill="#fff"/>
          <g style="transform-origin: 120px 125px; animation: blink 6s ease-in-out infinite;">
            <ellipse cx="122" cy="127" rx="8" ry="9" fill="#1a3a2a"/>
            <circle cx="118" cy="123" r="3" fill="#fff" opacity="0.8"/>
            <!-- Warmth sparkle -->
            <circle cx="126" cy="122" r="1.5" fill="#ffd700" opacity="0.5"/>
          </g>
          <ellipse cx="160" cy="125" rx="15" ry="16" fill="#fff"/>
          <g style="transform-origin: 160px 125px; animation: blink 6s ease-in-out infinite 0.5s;">
            <ellipse cx="158" cy="127" rx="8" ry="9" fill="#1a3a2a"/>
            <circle cx="154" cy="123" r="3" fill="#fff" opacity="0.8"/>
            <circle cx="162" cy="122" r="1.5" fill="#ffd700" opacity="0.5"/>
          </g>
        </g>

        <!-- Concerned-but-supportive brows (slightly raised) -->
        <path d="M104,108 Q112,102 130,107" fill="none" stroke="#3a8a55" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M150,107 Q168,102 176,108" fill="none" stroke="#3a8a55" stroke-width="2.5" stroke-linecap="round"/>

        <!-- Head bumps -->
        <circle cx="120" cy="95" r="4.5" fill="#4aaa6a" opacity="0.5"/>
        <circle cx="140" cy="91" r="5.5" fill="#4aaa6a" opacity="0.5"/>
        <circle cx="160" cy="95" r="4.5" fill="#4aaa6a" opacity="0.5"/>

        <!-- Monocle -->
        <circle cx="160" cy="125" r="19" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
        <line x1="179" y1="125" x2="193" y2="148" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
      </g>

      <!-- Crossword belly -->
      <g transform="translate(123, 236)" opacity="0.35">
        <rect x="0" y="0" width="10" height="10" fill="#fff" stroke="#2d6a3a" stroke-width="0.8"/>
        <rect x="10" y="0" width="10" height="10" fill="#1a3a2a" stroke="#2d6a3a" stroke-width="0.8"/>
        <rect x="20" y="0" width="10" height="10" fill="#fff" stroke="#2d6a3a" stroke-width="0.8"/>
        <rect x="0" y="10" width="10" height="10" fill="#1a3a2a" stroke="#2d6a3a" stroke-width="0.8"/>
        <rect x="10" y="10" width="10" height="10" fill="#fff" stroke="#2d6a3a" stroke-width="0.8"/>
        <rect x="20" y="10" width="10" height="10" fill="#1a3a2a" stroke="#2d6a3a" stroke-width="0.8"/>
      </g>
    </svg>

    <div class="speech">
      <div class="speaker">Cryptic Croc</div>
      Not quite, but you're swimming in the right direction! That was a
      really clever guess. Here's a nudge — try reading the clue from
      the <b>other end</b>. The definition might be hiding where you
      least expect it!
    </div>
  </div>
</body>
</html>
